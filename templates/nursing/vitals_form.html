{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Record Vitals - {{ block.super }}{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8">
    <div class="card shadow-sm">
        <div class="card-header bg-danger text-white"><h5 class="mb-0"><i class="bi bi-heart-pulse"></i> Record Patient Vitals</h5></div>
        <div class="card-body">
            <form method="post" novalidate>{% csrf_token %}{% crispy form %}</form>
        </div>
    </div>
</div></div>
{% endblock %}
