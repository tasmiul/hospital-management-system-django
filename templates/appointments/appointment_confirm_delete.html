{% extends "base.html" %}
{% block title %}Cancel Appointment | {{ hospital_name }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-calendar-x me-2"></i>Cancel Appointment</h4>
    <a href="{% url 'appointments:appointment_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card border-danger">
    <div class="card-body text-center py-5">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
        <h5 class="mt-3">Are you sure you want to cancel this appointment?</h5>
        <p class="text-muted">This action cannot be undone.</p>
        <form method="post" class="d-inline needs-validation" novalidate>
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="bi bi-x-lg me-1"></i>Cancel Appointment</button>
            <a href="{% url 'appointments:appointment_list' %}" class="btn btn-outline-secondary ms-2">Go Back</a>
        </form>
    </div>
</div>
{% endblock %}
