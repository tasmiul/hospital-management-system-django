{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Inventory Form{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="fas fa-form me-2"></i>{% if form.instance.pk %}Update{% else %}Create{% endif %} Item</h4>
    <a href="{% url 'inventory:item_list' %}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i>Back</a>
</div>
<div class="card">
    <div class="card-body">
        {% crispy form %}
    </div>
</div>
{% endblock %}
