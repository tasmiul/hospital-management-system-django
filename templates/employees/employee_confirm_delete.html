{% extends "base.html" %}
{% block title %}Delete Employee | {{ hospital_name }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-people me-2"></i>Delete Employee</h4>
    <a href="{% url 'employees:employee_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card border-danger">
    <div class="card-body text-center py-5">
        <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
        <h5 class="mt-3">Are you sure you want to delete "{{ object }}"?</h5>
        <p class="text-muted">This action cannot be undone.</p>
        <form method="post" class="d-inline needs-validation" novalidate>
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Delete</button>
            <a href="{% url 'employees:employee_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
