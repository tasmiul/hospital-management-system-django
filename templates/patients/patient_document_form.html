{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Upload Document | {{ hospital_name }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-upload me-2"></i>Upload Document for {{ patient }}</h4>
    <a href="{% url 'patients:patient_documents' patient.pk %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data" class="needs-validation" novalidate>
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary mt-2"><i class="bi bi-upload me-1"></i>Upload</button>
        </form>
    </div>
</div>
{% endblock %}
