{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Admit Patient - {{ block.super }}{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white"><h5 class="mb-0"><i class="bi bi-person-workspace"></i> {% if form.instance.pk %}Edit Admission{% else %}Admit New Patient{% endif %}</h5></div>
        <div class="card-body">
            <form method="post" novalidate>{% csrf_token %}{% crispy form %}</form>
        </div>
    </div>
</div></div>
{% endblock %}
