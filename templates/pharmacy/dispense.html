{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Dispense Medicine - MEDCARE HOSPITAL & DIAGNOSTIC CENTER{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="bi bi-capsule"></i> Dispense Medicine</h5>
            </div>
            <div class="card-body">
                <form method="post" novalidate class="needs-validation">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="{% url 'pharmacy:prescription_list' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Dispense Medicine</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
